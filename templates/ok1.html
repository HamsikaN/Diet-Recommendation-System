<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #f7e3e3;
        }
        header {
            width: 100%;
            background-color: #2c3e50;
            padding: 20px 0;
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .wrapper {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }
        .container, .output {
            flex: 1;
            background: rgba(185, 90, 133, 0.28);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(23, 22, 22, 0.1);
            max-width: 550px;
            margin: 30px;
        }
        h1 {
            text-align:center;
            color: #2c3e50;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin: 10px 0 5px;
            color: #555;
        }
        input, select, button {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #403f3f;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #555;
        }
        #recommendation {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .output h2 {
            color: #2c3e50;
        }
        .output p {
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h1>Diet Recommendation System</h1>
            <form id="dietForm">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>

                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <label for="height">Height (cm):</label>
                <input type="number" id="height" name="height" required>

                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" name="weight" required>

                <label for="goal">Goal:</label>
                <select id="goal" name="goal" required>
                    <option value="Maintain Weight">Maintain Weight</option>
                    <option value="Weight Gain">Weight Gain</option>
                    <option value="Weight Loss">Weight Loss</option>
                </select>

                <button type="submit">Get Recommendation</button>
            </form>
        </div>

        <div class="output">
            <div id="recommendation">
                <h2>Recommendation Output</h2>
                <p>Fill out the form to see your recommendations here.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('dietForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Gather input data
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;
            const goal = document.getElementById('goal').value;

            // Send data to the backend via POST request
            fetch('/recommendations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `age=${age}&gender=${gender}&height=${height}&weight=${weight}&goal=${goal}`,
            })
            .then(response => response.json())
            .then(data => {
                // Display the recommendation in the recommendation div
                const recommendationHTML = `
                    <h2>Your Diet Recommendation</h2>
                    <p><strong>BMI:</strong> ${data.BMI}</p>
                    <p><strong>BMI Category:</strong> ${data['BMI Category']}</p>
                    <p><strong>Diet Recommendation:</strong> ${data['Diet Recommendation']}</p>
                    <p><strong>Food Recommendation:</strong> ${data['Food Recommendation']}</p>
                    <p><strong>Exercise Recommendation:</strong> ${data['Exercise Recommendation']}</p>
                    <p><strong>Hydration Recommendation:</strong> ${data['Hydration Recommendation']}</p>
                    <p><strong>Sleep Recommendation:</strong> ${data['Sleep Recommendation']}</p>
                `;
                document.getElementById('recommendation').innerHTML = recommendationHTML;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('recommendation').innerHTML = 'There was an error getting your recommendation.';
            });
        });
    </script>
</body>
</html>
